<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTAZZ PRODUCTION | Create Anything, Tell Your Story</title>
    <style>
        /* Base Styles */
        :root {
            --hotpink: #FF1493;
            --white: #FFFFFF;
            --blue: #1E90FF;
            --dark-blue: #0A2463;
            --light-gray: #F5F5F5;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
        }
        
        body {
            background-color: var(--white);
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Staircase Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: 
                /* Dark gradient overlay for better text visibility */
                linear-gradient(135deg, 
                    rgba(10, 10, 10, 0.85) 0%, 
                    rgba(26, 26, 46, 0.8) 50%, 
                    rgba(22, 33, 62, 0.85) 100%),
                /* Brand gradient overlay */
                linear-gradient(135deg, 
                    rgba(255, 20, 147, 0.2) 0%, 
                    rgba(30, 144, 255, 0.15) 100%),
                /* Background image - Production warehouse */
                url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0 20px;
            overflow: hidden;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            position: relative;
            z-index: 2;
        }

        .staircase-text {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .text-line {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FF1493 0%, #1E90FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
            position: relative;
            width: fit-content;
        }

        /* Staircase positioning */
        .text-line:nth-child(1) {
            animation-delay: 0.2s;
            /* ISTAZZ PRODUCTION - centered */
            margin-left: 0;
        }

        .text-line:nth-child(2) {
            animation-delay: 0.4s;
            /* CREATE ANYTHING - starts under "PRODUCTION" and extends to the right */
            margin-left: 80px;
        }

        .text-line:nth-child(3) {
            animation-delay: 0.6s;
            /* TELL YOUR STORY - starts under "ANYTHING" and extends to the right */
            margin-left: 160px;
        }

        .hero-description {
            font-size: 1.1rem;
            color: #e0e0e0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 0.8s;
        }

        .hero-btn {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, #FF1493 0%, #1E90FF 100%);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.4);
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out forwards;
            animation-delay: 1s;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 20, 147, 0.6);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .text-line {
                font-size: 2.2rem;
                letter-spacing: 1.5px;
            }
            
            .text-line:nth-child(2) {
                margin-left: 50px;
            }

            .text-line:nth-child(3) {
                margin-left: 100px;
            }
            
            .hero-description {
                font-size: 1rem;
                max-width: 400px;
            }
            
            .hero-btn {
                padding: 12px 30px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .text-line {
                font-size: 1.8rem;
            }
            
            .text-line:nth-child(2) {
                margin-left: 30px;
            }

            .text-line:nth-child(3) {
                margin-left: 60px;
            }
            
            .hero-description {
                font-size: 0.95rem;
                max-width: 350px;
            }
        }
    </style>
</head>
<body>
    <!-- BACK BUTTON (paste inside <body>) -->
<button id="backBtn" aria-label="Go back" title="Go back">
  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/>
  </svg>
</button>

<style>
  :root{
    --hot: #ff4da6;
    --blue: #2b95ff;
    --white: #ffffff;
  }

  /* Back button base */
  #backBtn{
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    left: calc(12px + env(safe-area-inset-left));
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 56px;            /* touch-friendly size */
    height: 56px;
    padding: 6px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    color: #0b0b0b;
    background: linear-gradient(135deg, var(--white) 10%, var(--hot) 50%, var(--blue) 100%);
    box-shadow: 0 10px 30px rgba(37, 43, 77, 0.12), inset 0 -6px 18px rgba(255,255,255,0.08);
    transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
    -webkit-tap-highlight-color: transparent; /* removes mobile highlight */
    touch-action: manipulation;
  }

  /* Icon sizing & color */
  #backBtn svg{ display:block; color: #fff; filter: drop-shadow(0 1px 0 rgba(0,0,0,0.12)); }

  /* Hover / focus / active */
  #backBtn:hover,
  #backBtn:focus{
    transform: translateY(-4px);
    box-shadow: 0 18px 40px rgba(37, 43, 77, 0.18);
    outline: none;
  }

  #backBtn:active{
    transform: translateY(-1px) scale(.98);
  }

  /* Slightly smaller on very small screens */
  @media (max-width: 420px){
    #backBtn{ width:50px; height:50px; border-radius:12px; }
  }

  /* Option to hide on very small heights (optional) */
  @media (max-height: 360px){
    #backBtn{ display: none; }
  }
</style>

<script>
  (function(){
    const btn = document.getElementById('backBtn');

    // Primary action: go back in history. Fallback: root (change as needed).
    function goBack(){
      if (window.history && window.history.length > 1) {
        window.history.back();
      } else {
        // Fallback URL if there's no history — change '/' to any page you prefer
        window.location.href = '/';
      }
    }

    // Click / touch
    btn.addEventListener('click', goBack);

    // Keyboard accessibility: Enter / Space
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        goBack();
      }
    });

    // Optional: hide button if on homepage (example check)
    // if (location.pathname === '/' || location.pathname.endsWith('index.html')) {
    //   btn.style.display = 'none';
    // }

  })();
</script>

    <section class="hero">
        <div class="hero-content">
            <div class="staircase-text">
                <div class="text-line">ISTAZZ PRODUCTION</div>
                <div class="text-line">CREATE ANYTHING</div>
                <div class="text-line">TELL YOUR STORY</div>
            </div>
            <p class="hero-description">Bringing your vision to life through professional TV, radio, digital production, and stunning visual storytelling.</p>
            <a href="#services" class="hero-btn">Explore Our Services</a>
        </div>
    </section>
</body>
</html>
